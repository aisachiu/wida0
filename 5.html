<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Judge Master - Multi-Comp Edition</title>
    <style>
        :root { --primary: #2e7d32; --secondary: #fb8c00; --danger: #d32f2f; --bg: #f0f2f5; --star-gold: #ffc107; --star-empty: #bdc3c7; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding-bottom: 120px; }
        
        /* Competition Manager */
        .comp-manager { background: #333; color: white; padding: 15px; }
        .comp-row { display: flex; gap: 10px; align-items: flex-end; flex-wrap: wrap; }
        .input-group { display: flex; flex-direction: column; gap: 5px; }
        .input-group label { font-size: 0.7rem; color: #aaa; text-transform: uppercase; }
        input, select { padding: 8px; border-radius: 4px; border: 1px solid #ccc; font-size: 0.9rem; }
        .btn-add { background: var(--primary); color: white; border: none; padding: 8px 15px; cursor: pointer; border-radius: 4px; }
        
        /* Tabs */
        .tab-bar { display: flex; background: #fff; position: sticky; top: 0; z-index: 1000; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .tab { flex: 1; text-align: center; padding: 15px; font-weight: bold; color: #666; cursor: pointer; border-bottom: 3px solid transparent; }
        .tab.active { color: var(--primary); border-bottom-color: var(--primary); }

        .content-section { display: none; padding: 15px; max-width: 1200px; margin: 0 auto; }
        .content-section.active { display: block; }

        /* Stage Area */
        .grid { display: grid; gap: 15px; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); }
        .card { background: #fff; border-radius: 12px; padding: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); border-top: 6px solid var(--primary); }
        .star-row { font-size: 1.8rem; cursor: pointer; color: var(--star-empty); margin: 10px 0; }
        .star-row .filled { color: var(--star-gold); }
        .pts-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
        .pts-val { font-size: 1.5rem; font-weight: bold; width: 40px; }
        textarea { width: 100%; min-height: 80px; border-radius: 8px; border: 1px solid #ddd; padding: 8px; box-sizing: border-box; }

        /* JSON Modal */
        #jsonModal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; z-index: 3000; color: white; padding: 20px; box-sizing: border-box; }
        #jsonModal textarea { width: 100%; height: 70%; background: #222; color: #0f0; font-family: monospace; }

        /* Bottom Nav */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #fff; padding: 15px 0; display: flex; justify-content: center; gap: 15px; border-top: 1px solid #ddd; }
        .nav-btn { padding: 12px 25px; border-radius: 25px; border: none; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="comp-manager">
    <div class="comp-row">
        <div class="input-group">
            <label>Current Competition</label>
            <select id="compSelect" onchange="loadCompetition()"></select>
        </div>
        <div class="input-group">
            <label>New Comp Name</label>
            <input type="text" id="newCompName" placeholder="e.g. Dublin Open">
        </div>
        <div class="input-group">
            <label>Dancer Set</label>
            <select id="dancerSetSelect"></select>
        </div>
        <button class="btn-add" onclick="createNewCompetition()">Add Comp</button>
        <button class="btn-add" style="background:#555" onclick="openJsonModal()">Manage Dancer Sets</button>
    </div>
</div>

<div class="tab-bar">
    <div class="tab active" onclick="switchTab('stage')">STAGE</div>
    <div class="tab" onclick="switchTab('points')">POINTS</div>
    <div class="tab" onclick="switchTab('stars')">STARS</div>
</div>

<section id="stage" class="content-section active">
    <div style="text-align:center; margin-bottom:15px">
        <select id="stageSize" onchange="renderStage()">
            <option value="1">1 Stage</option><option value="2" selected>2 Stage</option>
            <option value="3">3 Stage</option><option value="4">4 Stage</option>
        </select>
        <select id="startDancerSelect" onchange="jumpToDancer()"></select>
    </div>
    <div id="stageDisplay" class="grid"></div>
</section>

<section id="points" class="content-section"></section>
<section id="stars" class="content-section"></section>

<div id="jsonModal">
    <h2>Manage Dancer JSON Sets</h2>
    <p>Paste your JSON array here. Format: [{"ID":"T121", "SAFE_NAME":"...", ...}]</p>
    <input type="text" id="setName" placeholder="Set Name (e.g. U15 Reels)">
    <textarea id="jsonInput"></textarea>
    <div style="margin-top:10px">
        <button class="btn-add" onclick="saveDancerSet()">Save Set</button>
        <button class="btn-add" style="background:red" onclick="closeJsonModal()">Close</button>
    </div>
</div>

<div class="bottom-nav">
    <button class="nav-btn" onclick="navStage(-1)">Previous</button>
    <button class="nav-btn" style="background:var(--primary); color:white" onclick="navStage(1)">Next Set</button>
</div>

<script>
    // Initial Default Data
    const defaultDancers = [
        {"ID": "T121", "SAFE_NAME": "Amir A", "SCHOOLNAME": "Grand Emerald", "COUNTRY": "Ukraine"},
        {"ID": "T122", "SAFE_NAME": "Néab M", "SCHOOLNAME": "The Emerald Lakes", "COUNTRY": "Ireland"},
        {"ID": "T123", "SAFE_NAME": "Stel N", "SCHOOLNAME": "The Arc", "COUNTRY": "Germany"},
        {"ID": "T124", "SAFE_NAME": "Made B", "SCHOOLNAME": "Heart of Ireland", "COUNTRY": "USA"}
    ];

    let currentComp = "";
    let stageIndices = [0, 1];

    // --- Storage Logic ---
    function getLibrary() { return JSON.parse(localStorage.getItem('dancerLibrary')) || { "U 20 Traditional Set 2026": defaultDancers }; }
    function getComps() { return JSON.parse(localStorage.getItem('compsList')) || []; }
    function getScore(comp, id) { return JSON.parse(localStorage.getItem(`score_${comp}_${id}`)) || {h:0, p:0, n:''}; }
    function saveScore(comp, id, data) { localStorage.setItem(`score_${comp}_${id}`, JSON.stringify(data)); }

    // --- Competition Management ---
    function createNewCompetition() {
        const name = document.getElementById('newCompName').value.trim();
        const set = document.getElementById('dancerSetSelect').value;
        if(!name) return alert("Enter comp name");
        let comps = getComps();
        comps.push({ name, setId: set });
        localStorage.setItem('compsList', JSON.stringify(comps));
        currentComp = name;
        initCompDropdown();
        loadCompetition();
    }

    function initCompDropdown() {
        const sel = document.getElementById('compSelect');
        const comps = getComps();
        sel.innerHTML = comps.map(c => `<option value="${c.name}">${c.name}</option>`).join('');
        if(comps.length > 0 && !currentComp) currentComp = comps[0].name;
        sel.value = currentComp;

        const setSel = document.getElementById('dancerSetSelect');
        const lib = getLibrary();
        setSel.innerHTML = Object.keys(lib).map(k => `<option value="${k}">${k}</option>`).join('');
    }

    function loadCompetition() {
        currentComp = document.getElementById('compSelect').value;
        const comps = getComps();
        const compObj = comps.find(c => c.name === currentComp);
        if(!compObj) return;
        
        const dancers = getLibrary()[compObj.setId];
        const startSel = document.getElementById('startDancerSelect');
        startSel.innerHTML = dancers.map((d,i) => `<option value="${i}">${d.ID}</option>`).join('');
        stageIndices = [0, 1]; 
        renderStage();
    }

    // --- JSON Set Management ---
    function openJsonModal() { document.getElementById('jsonModal').style.display = 'block'; }
    function closeJsonModal() { document.getElementById('jsonModal').style.display = 'none'; }
    function saveDancerSet() {
        const name = document.getElementById('setName').value.trim();
        const raw = document.getElementById('jsonInput').value;
        if(!name || !raw) return alert("Fill all fields");
        try {
            const parsed = JSON.parse(raw);
            let lib = getLibrary();
            lib[name] = parsed;
            localStorage.setItem('dancerLibrary', JSON.stringify(lib));
            initCompDropdown();
            closeJsonModal();
        } catch(e) { alert("Invalid JSON format"); }
    }

    // --- Stage Rendering ---
    function renderCard(d, slot) {
        if(!d) return "";
        const s = getScore(currentComp, d.ID);
        let stars = "";
        for(let i=1; i<=5; i++) stars += `<span class="${i<=s.h?'filled':''}" onclick="updateH('${d.ID}',${i})">★</span>`;
        
        return `
            <div class="card">
                <div style="display:flex; justify-content:space-between">
                    <span style="font-size:1.5rem; font-weight:bold">${d.ID}</span>
                    <button onclick="skip(${slot})" style="color:red; border:none; background:none; cursor:pointer">✕</button>
                </div>
                <b>${d.SAFE_NAME}</b><br><small>${d.SCHOOLNAME}</small>
                <div class="star-row">${stars}</div>
                <div class="pts-row">
                    <div class="pts-val">${s.p}</div>
                    <button class="btn-add" onclick="updateP('${d.ID}',1)">+1</button>
                    <button class="btn-add" onclick="updateP('${d.ID}',5)">+5</button>
                    <button class="btn-add" style="background:#888" onclick="updateP('${d.ID}',-1)">-1</button>
                </div>
                <textarea oninput="updateN('${d.ID}',this.value)" placeholder="Notes...">${s.n}</textarea>
            </div>`;
    }

    function renderStage() {
        const comp = getComps().find(c => c.name === currentComp);
        if(!comp) return;
        const dancers = getLibrary()[comp.setId];
        const size = parseInt(document.getElementById('stageSize').value);
        
        // Adjust array size if needed
        while(stageIndices.length < size) stageIndices.push((stageIndices[stageIndices.length-1] || 0) + 1);
        stageIndices = stageIndices.slice(0, size);

        document.getElementById('stageDisplay').innerHTML = stageIndices.map((idx, slot) => renderCard(dancers[idx], slot)).join('');
    }

    // --- Actions ---
    function updateH(id, val) { let s = getScore(currentComp, id); s.h = val; saveScore(currentComp, id, s); renderStage(); }
    function updateP(id, val) { let s = getScore(currentComp, id); s.p += val; saveScore(currentComp, id, s); renderStage(); }
    function updateN(id, val) { let s = getScore(currentComp, id); s.n = val; saveScore(currentComp, id, s); }
    function skip(slot) {
        let max = Math.max(...stageIndices);
        stageIndices[slot] = max + 1;
        renderStage();
    }
    function navStage(dir) {
        const size = parseInt(document.getElementById('stageSize').value);
        stageIndices = stageIndices.map(i => i + (size * dir));
        renderStage();
    }
    function jumpToDancer() {
        const start = parseInt(document.getElementById('startDancerSelect').value);
        const size = parseInt(document.getElementById('stageSize').value);
        stageIndices = [];
        for(let i=0; i<size; i++) stageIndices.push(start + i);
        renderStage();
    }

    function switchTab(t) {
        document.querySelectorAll('.tab, .content-section').forEach(el => el.classList.remove('active'));
        document.querySelector(`.tab[onclick*='${t}']`).classList.add('active');
        document.getElementById(t).classList.add('active');
    }

    // Init
    initCompDropdown();
    if(getComps().length === 0) {
        // Create first comp if none exist
        currentComp = "Initial Competition";
        let comps = [{ name: currentComp, setId: "U 20 Traditional Set 2026" }];
        localStorage.setItem('compsList', JSON.stringify(comps));
        initCompDropdown();
    }
    loadCompetition();

</script>

</body>
</html>
