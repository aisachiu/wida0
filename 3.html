<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dance Judge Pro</title>
    <style>
        :root {
            --primary: #2e7d32;
            --secondary: #fb8c00;
            --bg: #f0f2f5;
            --heart-red: #d32f2f;
            --heart-empty: #ccc;
        }

        body { 
            font-family: -apple-system, sans-serif; 
            background: var(--bg); margin: 0; padding-bottom: 80px; font-size: 16px;
        }

        /* Tabs */
        .tab-bar {
            display: flex; background: #fff; position: sticky; top: 0; z-index: 1000;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .tab { 
            flex: 1; text-align: center; padding: 15px; font-weight: bold; 
            color: #666; cursor: pointer; border-bottom: 3px solid transparent;
        }
        .tab.active { color: var(--primary); border-bottom-color: var(--primary); }

        .content-section { display: none; padding: 15px; max-width: 1000px; margin: 0 auto; }
        .content-section.active { display: block; }

        /* Stage View */
        .pair-container { display: flex; flex-direction: column; gap: 15px; }
        @media (min-width: 768px) { .pair-container { flex-direction: row; } }

        .card { 
            flex: 1; background: #fff; border-radius: 12px; padding: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1); border-top: 6px solid #ddd;
        }
        .dancer-1 { border-top-color: var(--primary); }
        .dancer-2 { border-top-color: var(--secondary); }

        .card-header { display: flex; justify-content: space-between; align-items: flex-start; }
        .id-label { font-size: 1.8rem; font-weight: 800; }
        .bin-btn { background: none; border: none; font-size: 1.2rem; cursor: pointer; opacity: 0.5; }
        .bin-btn:hover { opacity: 1; }

        /* Scoring Components */
        .heart-row { font-size: 1.8rem; cursor: pointer; margin: 10px 0; user-select: none; }
        .heart-row span { color: var(--heart-empty); transition: color 0.2s; }
        .heart-row span.filled { color: var(--heart-red); }

        .points-row { display: flex; align-items: center; gap: 15px; margin: 15px 0; }
        .pts-val { font-size: 1.8rem; font-weight: bold; width: 40px; text-align: center; }
        .pts-btns { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; flex-grow: 1; }
        .btn { border: none; padding: 10px 5px; border-radius: 4px; font-weight: bold; cursor: pointer; background: #eee; }
        .btn-plus { background: #e8f5e9; color: green; }
        .btn-minus { background: #ffebee; color: red; }

        textarea { width: 100%; min-height: 80px; border: 1px solid #ddd; border-radius: 8px; padding: 10px; box-sizing: border-box; }

        /* List View */
        .list-item { 
            background: #fff; margin-bottom: 10px; padding: 15px; border-radius: 8px;
            display: flex; justify-content: space-between; align-items: center; cursor: pointer;
        }
        .list-info h4 { margin: 0; }
        .list-score { text-align: right; }

        /* Overlay */
        #overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.8); display: none; z-index: 2000; align-items: center; justify-content: center;
        }
        .overlay-content { width: 90%; max-width: 500px; position: relative; }

        /* Bottom Nav */
        .bottom-nav { 
            position: fixed; bottom: 0; width: 100%; background: #fff; 
            padding: 15px 0; border-top: 1px solid #ddd; display: flex; justify-content: center; gap: 20px;
        }
    </style>
</head>
<body>

<div class="tab-bar">
    <div class="tab active" onclick="switchTab('stage')">STAGE</div>
    <div class="tab" onclick="switchTab('points')">POINTS</div>
    <div class="tab" onclick="switchTab('hearts')">HEARTS</div>
</div>

<section id="stage" class="content-section active">
    <select id="mainSelect" onchange="updateStage()"></select>
    <div id="stageDisplay" class="pair-container"></div>
    <div class="bottom-nav">
        <button class="btn" style="width:120px" onclick="navStage(-1)">Prev</button>
        <button class="btn btn-plus" style="width:120px; background:var(--primary); color:white" onclick="navStage(1)">Next</button>
    </div>
</section>

<section id="points" class="content-section"></section>
<section id="hearts" class="content-section"></section>

<div id="overlay" onclick="closeOverlay(event)">
    <div class="overlay-content" id="overlayInner" onclick="event.stopPropagation()"></div>
</div>

<script>
    const dancers = [
        {"ID": "T121", "SAFE_NAME": "Amir A", "SCHOOLNAME": "Grand Emerald", "COUNTRY": "Ukraine"},
        {"ID": "T122", "SAFE_NAME": "Néab M", "SCHOOLNAME": "The Emerald Lakes Academy Of Irish Dance", "COUNTRY": "Ireland"},
        {"ID": "T123", "SAFE_NAME": "Stel N", "SCHOOLNAME": "The Arc Of Irish Dance E.v", "COUNTRY": "Germany"},
        {"ID": "T124", "SAFE_NAME": "Made B", "SCHOOLNAME": "Heart Of Ireland School", "COUNTRY": "USA"},
        {"ID": "T125", "SAFE_NAME": "Oliv G", "SCHOOLNAME": "Miller Academy Of Irish Dance", "COUNTRY": "Scotland"},
        {"ID": "T126", "SAFE_NAME": "Marl C", "SCHOOLNAME": "Claddagh School Of Irish Dance", "COUNTRY": "Australia/Northern Ireland"},
        {"ID": "T127", "SAFE_NAME": "Ciar M", "SCHOOLNAME": "Miller Academy Of Irish Dance", "COUNTRY": "Scotland"},
        {"ID": "T128", "SAFE_NAME": "Lia K", "SCHOOLNAME": "The Arc Of Irish Dance E.v", "COUNTRY": "Germany"},
        {"ID": "T129", "SAFE_NAME": "Grac B", "SCHOOLNAME": "Toibreacha-Brennan Academy", "COUNTRY": "England"},
        {"ID": "T130", "SAFE_NAME": "Ange S", "SCHOOLNAME": "Diekdanzers & Hnt", "COUNTRY": "Germany"},
        {"ID": "T131", "SAFE_NAME": "Elis P", "SCHOOLNAME": "Aine Hay Academy", "COUNTRY": "Scotland"},
        {"ID": "T132", "SAFE_NAME": "Cinj G", "SCHOOLNAME": "Éirinn Irish Dance", "COUNTRY": "Switzerland"},
        {"ID": "T133", "SAFE_NAME": "Nynk B", "SCHOOLNAME": "Taradance", "COUNTRY": "Belgium"},
        {"ID": "T134", "SAFE_NAME": "Jil G", "SCHOOLNAME": "Scoil Rince O'Brannlaig", "COUNTRY": "Germany"},
        {"ID": "T135", "SAFE_NAME": "Lizz B", "SCHOOLNAME": "McCarthy Felton School Of Irish Dancing", "COUNTRY": "England"},
        {"ID": "T136", "SAFE_NAME": "Blái S", "SCHOOLNAME": "The Emerald Lakes Academy Of Irish Dance", "COUNTRY": "Ireland"},
        {"ID": "T137", "SAFE_NAME": "Tali C", "SCHOOLNAME": "Echoes Of Erin", "COUNTRY": "Hong Kong & Northern Ireland"},
        {"ID": "T138", "SAFE_NAME": "Madd F", "SCHOOLNAME": "Aine Hay Academy", "COUNTRY": "Scotland"},
        {"ID": "T139", "SAFE_NAME": "Joli N", "SCHOOLNAME": "The Arc Of Irish Dance E.v", "COUNTRY": "Germany"},
        {"ID": "T140", "SAFE_NAME": "Addi H", "SCHOOLNAME": "Miller Academy Of Irish Dance", "COUNTRY": "Scotland"},
        {"ID": "T141", "SAFE_NAME": "Dary B", "SCHOOLNAME": "Willdance", "COUNTRY": "Belarus"},
        {"ID": "T142", "SAFE_NAME": "Mack M", "SCHOOLNAME": "Aine Hay Academy", "COUNTRY": "Scotland"},
        {"ID": "T143", "SAFE_NAME": "Bria F", "SCHOOLNAME": "The Emerald Lakes Academy Of Irish Dance", "COUNTRY": "Ireland"},
        {"ID": "T144", "SAFE_NAME": "Nele B", "SCHOOLNAME": "Celtic Rainbow School Of Irish Dance", "COUNTRY": "Germany"},
        {"ID": "T145", "SAFE_NAME": "Jame M", "SCHOOLNAME": "Celtic Clover Academy Of Irish Dance Brussels", "COUNTRY": "Belgium"},
        {"ID": "T146", "SAFE_NAME": "Leil G", "SCHOOLNAME": "Stuart Irish Dance", "COUNTRY": "Germany"},
        {"ID": "T147", "SAFE_NAME": "Clai M", "SCHOOLNAME": "Morrissey School Of Irish Dancing - Kildare", "COUNTRY": "Ireland"},
        {"ID": "T148", "SAFE_NAME": "Pree M", "SCHOOLNAME": "Aine Hay Academy", "COUNTRY": "Scotland"},
        {"ID": "T149", "SAFE_NAME": "Boto S", "SCHOOLNAME": "Celtic Dream Irish Dance Group", "COUNTRY": "Hungary"},
        {"ID": "T150", "SAFE_NAME": "Anas S", "SCHOOLNAME": "Dance Spirit Irish Dance School", "COUNTRY": "Belarus"},
        {"ID": "T151", "SAFE_NAME": "Flor L", "SCHOOLNAME": "The Arc Of Irish Dance E.v", "COUNTRY": "Germany"},
        {"ID": "T152", "SAFE_NAME": "Stel A", "SCHOOLNAME": "Miller Academy Of Irish Dance", "COUNTRY": "Scotland"},
        {"ID": "T153", "SAFE_NAME": "Jess F", "SCHOOLNAME": "Murphy Gray Academy Of Irish Dance", "COUNTRY": "Ireland"},
        {"ID": "T154", "SAFE_NAME": "Evel D", "SCHOOLNAME": "Bassdance", "COUNTRY": "Belarus"},
        {"ID": "T155", "SAFE_NAME": "Anya R", "SCHOOLNAME": "Heart Of Ireland School", "COUNTRY": "USA"},
        {"ID": "T156", "SAFE_NAME": "Alex M", "SCHOOLNAME": "The Arc Of Irish Dance E.v", "COUNTRY": "Germany"},
        {"ID": "T157", "SAFE_NAME": "Zoe L", "SCHOOLNAME": "Aine Hay Academy", "COUNTRY": "Scotland"},
        {"ID": "T158", "SAFE_NAME": "Juli S", "SCHOOLNAME": "Celtic Grace School Of Irish Dance", "COUNTRY": "Germany"},
        {"ID": "T159", "SAFE_NAME": "Laur M", "SCHOOLNAME": "Murphy Gray Academy Of Irish Dance", "COUNTRY": "Ireland"},
        {"ID": "T160", "SAFE_NAME": "Iona G", "SCHOOLNAME": "Echoes Of Erin", "COUNTRY": "Hong Kong & Northern Ireland"},
        {"ID": "T161", "SAFE_NAME": "Kirs M", "SCHOOLNAME": "Fallon Academy Of Irish Dance", "COUNTRY": "Scotland"},
        {"ID": "T162", "SAFE_NAME": "Jess L", "SCHOOLNAME": "Echoes Of Erin", "COUNTRY": "Hong Kong & Northern Ireland"}
    ];

    // LocalStorage Functions
    const getS = (id) => JSON.parse(localStorage.getItem('d_'+id)) || { h:0, p:0, n:'' };
    const setS = (id, obj) => localStorage.setItem('d_'+id, JSON.stringify(obj));

    // Global Actions
    window.actH = (id, val) => { let s = getS(id); s.h = val; setS(id, s); refresh(); };
    window.actP = (id, val) => { let s = getS(id); s.p += val; setS(id, s); refresh(); };
    window.actN = (id, val) => { let s = getS(id); s.n = val; setS(id, s); };
    window.actBin = (id) => { if(confirm('Clear data for '+id+'?')) { localStorage.removeItem('d_'+id); refresh(); closeOverlay(); } };

    function refresh() { 
        updateStage(); 
        if(document.getElementById('points').classList.contains('active')) renderPoints();
        if(document.getElementById('hearts').classList.contains('active')) renderHearts();
    }

    // Tabs
    function switchTab(t) {
        document.querySelectorAll('.tab, .content-section').forEach(el => el.classList.remove('active'));
        document.querySelector(`.tab[onclick*="${t}"]`).classList.add('active');
        document.getElementById(t).classList.add('active');
        if(t === 'points') renderPoints();
        if(t === 'hearts') renderHearts();
    }

    // Stage View
    const sel = document.getElementById('mainSelect');
    dancers.forEach((d,i) => { let o = document.createElement('option'); o.value=i; o.text=d.ID; sel.add(o); });

    function renderCard(d, num) {
        if(!d) return `<div class="card"><h3>End of List</h3></div>`;
        const s = getS(d.ID);
        let hHtml = '';
        for(let i=1; i<=5; i++) hHtml += `<span class="${i <= s.h ? 'filled' : ''}" onclick="actH('${d.ID}',${i})">❤</span>`;

        return `
            <div class="card dancer-${num}">
                <div class="card-header">
                    <span class="id-label">${d.ID}</span>
                    <button class="bin-btn" onclick="actBin('${d.ID}')">🗑️</button>
                </div>
                <div style="font-weight:bold">${d.SAFE_NAME}</div>
                <div style="font-size:0.8rem; color:#666">${d.SCHOOLNAME}</div>
                <div class="heart-row">${hHtml}</div>
                <div class="points-row">
                    <div class="pts-val">${s.p}</div>
                    <div class="pts-btns">
                        <button class="btn btn-plus" onclick="actP('${d.ID}',1)">+1</button>
                        <button class="btn btn-plus" onclick="actP('${d.ID}',3)">+3</button>
                        <button class="btn btn-plus" onclick="actP('${d.ID}',5)">+5</button>
                        <button class="btn btn-minus" onclick="actP('${d.ID}',-1)">-1</button>
                    </div>
                </div>
                <textarea oninput="actN('${d.ID}',this.value)" placeholder="Comments...">${s.n}</textarea>
            </div>`;
    }

    function updateStage() {
        const i = parseInt(sel.value);
        document.getElementById('stageDisplay').innerHTML = renderCard(dancers[i],1) + renderCard(dancers[i+1],2);
    }

    window.navStage = (v) => { let next = parseInt(sel.value)+v; if(next >=0 && next < dancers.length) { sel.value=next; updateStage(); } };

    // List Views
    function renderPoints() {
        const data = dancers.map(d => ({...d, ...getS(d.ID)})).filter(x => x.p !== 0 || x.h !== 0 || x.n !== "").sort((a,b) => b.p - a.p);
        let h = `<h3>Ranked by Points</h3>`;
        data.forEach(d => h += listTemplate(d));
        document.getElementById('points').innerHTML = h || "No data saved yet.";
    }

    function renderHearts() {
        const data = dancers.map(d => ({...d, ...getS(d.ID)})).filter(x => x.p !== 0 || x.h !== 0 || x.n !== "").sort((a,b) => b.h - a.h || b.p - a.p);
        let h = `<h3>Ranked by Hearts</h3>`;
        data.forEach(d => h += listTemplate(d));
        document.getElementById('hearts').innerHTML = h || "No data saved yet.";
    }

    function listTemplate(d) {
        return `<div class="list-item" onclick="openEdit('${d.ID}')">
            <div class="list-info"><h4>${d.ID} - ${d.SAFE_NAME}</h4><small>${d.SCHOOLNAME}</small></div>
            <div class="list-score"><b>${d.p} pts</b><br><span style="color:var(--heart-red)">${'❤'.repeat(d.h)}</span></div>
        </div>`;
    }

    // Overlay
    window.openEdit = (id) => {
        const d = dancers.find(x => x.ID === id);
        document.getElementById('overlayInner').innerHTML = renderCard(d, 1);
        document.getElementById('overlay').style.display = 'flex';
    };
    window.closeOverlay = (e) => { document.getElementById('overlay').style.display = 'none'; };

    updateStage();
</script>
</body>
</html>
